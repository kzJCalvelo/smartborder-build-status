<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SB Build Status</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page">
    <header>
      <h1>SB Build Status</h1>
      <p class="subtitle">smartborder-api · southranch / SBWeb</p>
    </header>

    <div class="filters">
      <div class="filter-group">
        <span class="filter-label">Environment</span>
        <div class="filter-tabs" id="env-tabs"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">Status</span>
        <div class="filter-tabs" id="status-tabs"></div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Pipeline</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="pipeline-rows"></tbody>
      </table>
    </div>

    <footer>Click a badge to open the pipeline in Azure DevOps.</footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
